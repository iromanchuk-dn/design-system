version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'
    groups:
      npm-development:
        dependency-type: 'development'
        patterns:
          - '**'
      npm-production:
        dependency-type: 'production'
        patterns:
          - '**'

  - package-ecosystem: 'github-actions'
    directories:
      - '/'
      - '/.github/actions/*'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    groups:
      github-actions:
        group-by: dependency-name
